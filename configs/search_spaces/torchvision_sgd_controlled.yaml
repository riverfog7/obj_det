params:
  learning_rate:
    type: float
    low: 0.001
    high: 0.01
    log: true

  weight_decay:
    type: categorical
    choices: [0.0001, 0.0005, 0.001]

  momentum:
    type: categorical
    choices: [0.9, 0.95]

  warmup_ratio:
    type: categorical
    choices: [0.0, 0.02, 0.05]

  lr_scheduler_type:
    type: categorical
    choices: [linear, cosine]

  max_grad_norm:
    type: categorical
    choices: [0.5, 1.0]
