params:
  learning_rate:
    type: float
    low: 0.00001
    high: 0.0001
    log: true
  weight_decay:
    type: categorical
    choices: [0.0, 0.0001, 0.01]
  warmup_ratio:
    type: categorical
    choices: [0.0, 0.05, 0.1]
  lr_scheduler_type:
    type: categorical
    choices: [linear, cosine]
  max_grad_norm:
    type: categorical
    choices: [0.1, 1.0]
