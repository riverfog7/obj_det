dataset:
  path: datasets/hazydet
  train_split: train
  val_split: val
  test_split: test

model_file: ../models/fcos_r50.yaml
transform_file: ../transforms/basic_640.yaml

classes:
  - person
  - bicycle
  - motorcycle
  - car
  - bus
  - truck

train:
  run_key: fcos_r50_hazydet_controlled
  label_mode: meta
  output_dir: runs/fcos_r50/hazydet/controlled
  protocol: controlled
  max_epochs: 50
  batch_size: 4
  logging_steps: 10
  eval_strategy:
    enabled: false
    every_epochs: 1
  loader:
    num_workers: 4
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 2
    predecode_images: false
  seed: 0
  hparams:
    optimizer: sgd
    learning_rate: 0.005
    weight_decay: 0.0005
    momentum: 0.9
    lr_scheduler_type: linear

eval:
  batch_size: 4
  conf_threshold: 0.001
  iou_threshold: 0.7

predict:
  batch_size: 4
  conf_threshold: 0.001
  iou_threshold: 0.7

tuning:
  study_name: fcos_r50_hazydet_controlled
  n_trials: 10
  objective_metric: map_50_95
  output_dir: runs/hpo/fcos_r50_hazydet_controlled

logging:
  backends: [local, wandb]
  wandb:
    project: fcos_r50_hazydet_controlled

search_space_file: ../search_spaces/torchvision_controlled.yaml

final:
  seeds: [0, 1, 2]
  output_dir: runs/fcos_r50/hazydet/controlled/final
  evaluate_val: true
