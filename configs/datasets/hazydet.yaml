key: hazydet
root: source_datasets/hazydet
source_format: coco

default_condition: haze
default_domain: aerial
default_is_synthetic:
bbox_policy: clip

splits:
  train:
    paths:
      images: train/hazy_images
      annotations: train/train_coco.json
    condition: haze
    domain: aerial
    is_synthetic: true

  val:
    paths:
      images: val/hazy_images
      annotations: val/val_coco.json
    condition: haze
    domain: aerial
    is_synthetic: true

  test:
    paths:
      images: test/hazy_images
      annotations: test/test_coco.json
    condition: haze
    domain: aerial
    is_synthetic: true

  real_world_train:
    paths:
      images: real_world/train
      annotations: real_world/train_real.json
    condition: haze
    domain: aerial
    is_synthetic: false

  real_world_test:
    paths:
      images: real_world/test
      annotations: real_world/test_real.json
    condition: haze
    domain: aerial
    is_synthetic: false

class_map:
  pedestrian: person
  people: person
  bicycle: bicycle
  car: car
  van: car
  truck: truck
  tricycle: motorcycle
  awning-tricycle: motorcycle
  bus: bus
  motor: motorcycle

ignore_labels: []

