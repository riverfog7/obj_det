key: dawn
root: source_datasets/dawn
source_format: yolo_noyml

default_condition: mixed
default_domain: road
default_is_synthetic: false
bbox_policy: clip

splits:
  train:
    paths:
      images: splits/train/images
      labels: splits/train/labels
    condition: mixed
    domain: road
    is_synthetic: false
  val:
    paths:
      images: splits/val/images
      labels: splits/val/labels
    condition: mixed
    domain: road
    is_synthetic: false
  test:
    paths:
      images: splits/test/images
      labels: splits/test/labels
    condition: mixed
    domain: road
    is_synthetic: false

class_names:
  1: person
  2: bicycle
  3: car
  4: motorcycle
  5: airplane
  6: bus
  7: train
  8: truck

class_map:
  person: person
  bicycle: bicycle
  car: car
  motorcycle: motorcycle
  bus: bus
  truck: truck
  airplane:
  train:

ignore_labels: []

meta:
  license: CC-BY-NC-SA-4.0
  homepage: https://www.kaggle.com/datasets/shuvoalok/dawn-dataset
  split_policy: deterministic_80_10_10_content_grouped
  split_policy_note: project-defined; the source archive has no official splits
