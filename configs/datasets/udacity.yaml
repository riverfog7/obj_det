key: udacity
root: source_datasets/udacity
source_format: coco

default_condition: unknown
default_domain: road
default_is_synthetic: false
bbox_policy: clip

splits:
  train:
    paths:
      images: train
      annotations: train/_annotations.coco.json
  val:
    paths:
      images: valid
      annotations: valid/_annotations.coco.json
  test:
    paths:
      images: test
      annotations: test/_annotations.coco.json

class_map:
  car: car
  truck: truck
  pedestrian: person
  biker:
  trafficLight:
  trafficLight-Green:
  trafficLight-GreenLeft:
  trafficLight-Red:
  trafficLight-RedLeft:
  trafficLight-Yellow:
  trafficLight-YellowLeft:

ignore_labels: []

meta:
  homepage: https://www.kaggle.com/datasets/sshikamaru/udacity-self-driving-car-dataset
  license: MIT
  export_version: 3
  preprocessing: resized_to_512x512
  split_policy: deterministic_80_10_10_timestamp_blocks
  split_policy_note: project-defined; the Kaggle TensorFlow export has no split assignment
